name: Refresh Subscription Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch subscription snapshot
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
        run: |
          test -n "$SUBSCRIPTION_URL"
          curl --fail --location --silent --show-error "$SUBSCRIPTION_URL" > subscription.txt
          test -s subscription.txt

      - name: Upload snapshot to worker
        env:
          WORKER_UPLOAD_URL: ${{ secrets.WORKER_UPLOAD_URL }}
        run: |
          test -n "$WORKER_UPLOAD_URL"
          curl --fail --silent --show-error \
            -X PUT \
            --data-binary @subscription.txt \
            "$WORKER_UPLOAD_URL"

      - name: Fetch latest iOS mirror config
        env:
          WORKER_CONFIG_URL: ${{ secrets.WORKER_CONFIG_URL }}
        run: |
          test -n "$WORKER_CONFIG_URL"
          curl --fail --location --silent --show-error "$WORKER_CONFIG_URL" > default.json
          test -s default.json

      - name: Update gist mirror
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          test -n "$GIST_ID"
          test -n "$GIST_TOKEN"
          jq -Rs '{description: "singbox iOS default profile mirror", files: {"default.json": {content: .}}}' default.json > gist-payload.json
          curl --fail --silent --show-error \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_TOKEN" \
            https://api.github.com/gists/$GIST_ID \
            --data-binary @gist-payload.json > /dev/null
